name: QA Pipeline - Outsera Automação

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  playwright-api-testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run API tests
        run: npx playwright test --project=api --reporter=html
        continue-on-error: true

      - name: Upload Playwright API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-report
          path: reports/playwright-report/
          retention-days: 30

  performance-testing:
    runs-on: ubuntu-latest
    env:
      CI: true  # Ativa modo rápido no script K6
    steps:
      - uses: actions/checkout@v4

      - name: Install K6
        run: |
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.52.0/k6-v0.52.0-linux-amd64.tar.gz | tar -xz --strip-components=1 -C /usr/local/bin k6-v0.52.0-linux-amd64/k6

      - name: Run K6 load test
        run: k6 run performance/load-test.js || true  # Continua mesmo se thresholds falharem

      - name: Upload K6 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-reports
          path: reports/k6-*
          retention-days: 30