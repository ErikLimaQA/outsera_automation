name: QA Pipeline - Outsera Automação

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ----------------------------
  # 1) API tests (Playwright Test)
  # ----------------------------
  playwright-api-testing:
    name: API (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: dev
            dotenv_path: .env.dev
          - env: qa
            dotenv_path: .env.qa
          - env: prd
            dotenv_path: .env.prd
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests (${{ matrix.env }})
        env:
          ENV: ${{ matrix.env }}
          DOTENV_PATH: ${{ matrix.dotenv_path }}
          # Define explicitamente a pasta do report do Playwright
          PLAYWRIGHT_HTML_REPORT: playwright-report
        run: |
          npx playwright test tests/api --project=api-${{ matrix.env }} --reporter=html

      - name: Upload Playwright API report (${{ matrix.env }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-report-${{ matrix.env }}
          path: playwright-report/
          retention-days: 14

  # -------------------------------------------
  # 2) E2E Web (Cucumber + Playwright core)
  # -------------------------------------------
  e2e-web-testing:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Instala apenas o Chromium (suficiente para nossos hooks com chromium.launch)
      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      # Executa todas as features em tests/e2e/features
      - name: Run E2E tests (Cucumber + Playwright)
        run: |
          npx cucumber-js tests/e2e/features \
            --require tests/e2e/step_definitions \
            --require tests/e2e/pages \
            --require tests/e2e/features/support \
            --format progress-bar \
            --format html:reports/cucumber-report.html \
            --format json:reports/cucumber-report.json

      - name: Upload Cucumber E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-e2e-report
          path: |
            reports/**
          retention-days: 30

  # ----------------------------
  # 3) Performance (K6)
  # ----------------------------
  performance-testing:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Install K6
        run: |
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.52.0/k6-v0.52.0-linux-amd64.tar.gz | tar -xz --strip-components=1 -C /usr/local/bin k6-v0.52.0-linux-amd64/k6

      - name: Run K6 load test
        run: k6 run performance/load-test.js || true

      - name: Upload K6 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-reports
          path: reports/k6-*
          retention-days: 30
